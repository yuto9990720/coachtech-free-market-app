version: '3.8'

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: coachtech_nginx
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - coachtech_network

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: coachtech_php
    volumes:
      - ./src:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
    depends_on:
      - mysql
    networks:
      - coachtech_network

  mysql:
    image: mysql:8.0
    container_name: coachtech_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: coachtech_flea_market
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - coachtech_network

  mailhog:
    image: mailhog/mailhog
    container_name: coachtech_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - coachtech_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: coachtech_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - coachtech_network

networks:
  coachtech_network:
    driver: bridge

volumes:
  mysql_data:
